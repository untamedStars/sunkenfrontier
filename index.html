<!DOCTYPE html>
<html>
<head>
    <title>Lifepod Interior</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>

<div id="overlay">CLICK TO ENTER LIFEPOD</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js';

/* -----------------------------
   SCENE
----------------------------- */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2a);
scene.fog = new THREE.Fog(0x0b1a2a, 2, 8);

/* -----------------------------
   CAMERA
----------------------------- */

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 1.2, 0);

/* -----------------------------
   RENDERER
----------------------------- */

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0xff0000);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* -----------------------------
   INPUT
----------------------------- */

const keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

/* -----------------------------
   MOUSE LOOK (FPS)
----------------------------- */

let yaw = 0;
let pitch = 0;

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

    const overlay = document.getElementById("overlay");

document.addEventListener("pointerlockchange", () => {
    if (document.pointerLockElement === document.body) {
        overlay.style.display = "none";
    } else {
        overlay.style.display = "flex";
    }
});

document.addEventListener("mousemove", (e) => {
    if (document.pointerLockElement !== document.body) return;

    yaw -= e.movementX * 0.0015;
    pitch -= e.movementY * 0.0015;

pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

    camera.rotation.set(pitch, yaw, 0);
});

/* -----------------------------
   MOVEMENT
----------------------------- */

function updateMovement() {

    const speed = 0.05;

    const forward = new THREE.Vector3(
        -Math.sin(yaw),
        0,
        -Math.cos(yaw)
    );

    const right = new THREE.Vector3(
        -forward.z,
        0,
        forward.x
    );

    if (keys["KeyW"]) camera.position.addScaledVector(forward, speed);
    if (keys["KeyS"]) camera.position.addScaledVector(forward, -speed);
    if (keys["KeyA"]) camera.position.addScaledVector(right, -speed);
    if (keys["KeyD"]) camera.position.addScaledVector(right, speed);
}

/* -----------------------------
   LIGHTING
----------------------------- */

const light = new THREE.PointLight(0xffffff, 1.5, 10);
light.position.set(0, 2, 0);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

/* -----------------------------
   LIFEPOD INTERIOR
----------------------------- */

const room = new THREE.Mesh(
    new THREE.CylinderGeometry(4, 4, 7, 32, 1, true)
    new THREE.CircleGeometry(4, 32)
    floor.position.y = -3.5;
    ceiling.position.y = 3.5;
    new THREE.MeshStandardMaterial({
        color: 0x2b2f36,
        side: THREE.BackSide
    })
);
scene.add(room);

/* -----------------------------
   DOOR
----------------------------- */

const door = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.8, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x444b52 })
);
door.position.set(0, 0.5, -2.1);
scene.add(door);

/* -----------------------------
   WINDOW
----------------------------- */

const windowMesh = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.8, 0.1),
    new THREE.MeshStandardMaterial({
        color: 0x88ccee,
        transparent: true,
        opacity: 0.6
    })
);
windowMesh.position.set(0, 1.2, -2.1);
scene.add(windowMesh);

/* -----------------------------
   SEAT
----------------------------- */

const seat = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x555555 })
);
seat.position.set(0, 0.2, 1.2);
scene.add(seat);

/* -----------------------------
   LADDER
----------------------------- */

const ladder = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 3, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x666666 })
);
ladder.position.set(-2.0, 1.5, 0);
ladder.rotation.z = Math.PI / 2;
scene.add(ladder);

/* -----------------------------
   LOOP
----------------------------- */

function animate() {
    requestAnimationFrame(animate);

    updateMovement();

    renderer.render(scene, camera);
}

animate();

/* -----------------------------
   RESIZE
----------------------------- */

window.addEventListener("resize", () => {

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
