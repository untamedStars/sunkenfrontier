<!DOCTYPE html>
<html>
<head>
    <title>Lifepod Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>

<body>
<script type="module">

import * as THREE from 'https://unpkg.com/three@0.180.0/build/three.module.js';

/* -----------------------------
   SCENE SETUP
----------------------------- */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2a);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 2, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* -----------------------------
   LIGHTING
----------------------------- */

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 10, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

/* -----------------------------
   MATERIALS
----------------------------- */

const bodyMaterial = new THREE.MeshStandardMaterial({
    color: 0x9aa3ad,
    roughness: 0.8,
    metalness: 0.2
});

const detailMaterial = new THREE.MeshStandardMaterial({
    color: 0x444b52,
    roughness: 0.9
});

/* -----------------------------
   LIFEPOD BODY
----------------------------- */

const lifepod = new THREE.Mesh(
    new THREE.CapsuleGeometry(2, 4, 16, 32),
    bodyMaterial
);

scene.add(lifepod);

/* -----------------------------
   DOOR
----------------------------- */

const door = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.8, 0.2),
    detailMaterial
);

door.position.set(0, -0.5, 2.05);
scene.add(door);

/* -----------------------------
   WINDOW
----------------------------- */

const windowMesh = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.8, 0.1),
    new THREE.MeshStandardMaterial({
        color: 0x88ccee,
        transparent: true,
        opacity: 0.6
    })
);

windowMesh.position.set(0, 0.5, 2.05);
scene.add(windowMesh);

/* -----------------------------
   ROOF HATCH
----------------------------- */

const hatch = new THREE.Mesh(
    new THREE.CircleGeometry(0.8, 32),
    detailMaterial
);

hatch.rotation.x = Math.PI / 2;
hatch.position.y = 2.2;
scene.add(hatch);

/* -----------------------------
   LADDER (placeholder)
----------------------------- */

const ladder = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 3, 0.2),
    detailMaterial
);

ladder.position.set(-1.5, 0, 0);
scene.add(ladder);

/* -----------------------------
   SEAT
----------------------------- */

const seat = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.8),
    detailMaterial
);

seat.position.set(0, -0.5, 0.5);
scene.add(seat);

/* -----------------------------
   ANIMATION LOOP
----------------------------- */

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();

    // Floating motion
    lifepod.position.y = Math.sin(time * 0.5) * 0.1;
    lifepod.rotation.y = Math.sin(time * 0.2) * 0.02;

    renderer.render(scene, camera);
}

animate();

/* -----------------------------
   RESIZE HANDLING
----------------------------- */

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
