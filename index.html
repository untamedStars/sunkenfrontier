<!DOCTYPE html>
<html>
<head>
    <title>Lifepod Interior</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>

<div id="overlay">CLICK TO ENTER LIFEPOD</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js';

/* -----------------------------
   SCENE
----------------------------- */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2a);
scene.fog = new THREE.Fog(0x0b1a2a, 5, 20);

/* -----------------------------
   CAMERA + PLAYER
----------------------------- */

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const player = new THREE.Object3D();
player.position.set(0, -1.5, 2);

scene.add(player);
player.add(camera);

camera.position.set(0, 1.7, 0);

/* -----------------------------
   RENDERER
----------------------------- */

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* -----------------------------
   OVERLAY + POINTER LOCK
----------------------------- */

const overlay = document.getElementById("overlay");

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
    overlay.style.display =
        document.pointerLockElement === document.body
            ? "none"
            : "flex";
});

/* -----------------------------
   INPUT
----------------------------- */

const keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

/* -----------------------------
   CAMERA LOOK
----------------------------- */

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", (e) => {

    if (document.pointerLockElement !== document.body) return;

    yaw -= e.movementX * 0.0012;
    pitch -= e.movementY * 0.0012;

    pitch = Math.max(-1.4, Math.min(1.4, pitch));

    player.rotation.y = yaw;
    camera.rotation.x = pitch;
});

/* -----------------------------
   MOVEMENT
----------------------------- */

function updateMovement() {

    const speed = 0.08;

    const forward = new THREE.Vector3(
        -Math.sin(yaw),
        0,
        -Math.cos(yaw)
    );

    const right = new THREE.Vector3(
        -forward.z,
        0,
        forward.x
    );

    if (keys["KeyW"]) player.position.addScaledVector(forward, speed);
    if (keys["KeyS"]) player.position.addScaledVector(forward, -speed);
    if (keys["KeyA"]) player.position.addScaledVector(right, -speed);
    if (keys["KeyD"]) player.position.addScaledVector(right, speed);

    const limit = 3.4;

    player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
    player.position.z = Math.max(-limit, Math.min(limit, player.position.z));
}

/* -----------------------------
   LIGHTING
----------------------------- */

const mainLight = new THREE.PointLight(0xffffff, 1.5, 20);
mainLight.position.set(0, 2, 0);
scene.add(mainLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const blueLight = new THREE.PointLight(0x66aaff, 1, 12);
blueLight.position.set(0, 2, -2);
scene.add(blueLight);

const orangeLight = new THREE.PointLight(0xffaa44, 0.5, 8);
orangeLight.position.set(0, 0, 2);
scene.add(orangeLight);

/* -----------------------------
   POD ROOM
----------------------------- */

const room = new THREE.Mesh(
    new THREE.CylinderGeometry(4, 4, 7, 32, 1, true),
    new THREE.MeshStandardMaterial({
        color: 0x2b2f36,
        side: THREE.BackSide
    })
);

scene.add(room);

/* FLOOR */
const floor = new THREE.Mesh(
    new THREE.CircleGeometry(4, 32),
    new THREE.MeshStandardMaterial({ color: 0x555555 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3.5;
scene.add(floor);

/* CEILING */
const ceiling = new THREE.Mesh(
    new THREE.CircleGeometry(4, 32),
    new THREE.MeshStandardMaterial({ color: 0x444444 })
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 3.5;
scene.add(ceiling);

/* -----------------------------
   OBJECTS
----------------------------- */

const door = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 2.2, 0.15),
    new THREE.MeshStandardMaterial({ color: 0x444b52 })
);
door.position.set(0, 0.5, -3.9);
scene.add(door);

const windowMesh = new THREE.Mesh(
    new THREE.BoxGeometry(2.5, 1, 0.1),
    new THREE.MeshStandardMaterial({
        color: 0x88ccee,
        transparent: true,
        opacity: 0.9
    })
);
windowMesh.position.set(0, 1.7, -3.9);
scene.add(windowMesh);

const seat = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({ color: 0x555555 })
);
seat.position.set(0, -2.2, 2);
scene.add(seat);

const ladder = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 3, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x666666 })
);
ladder.position.set(-3.6, 0, 0);
scene.add(ladder);

const fabricator = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1.5, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x999999 })
);
fabricator.position.set(3.4, 0, 1);
scene.add(fabricator);

const storage = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1.2, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x777777 })
);
storage.position.set(3.3, -2.2, 1.5);
scene.add(storage);

const radio = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.6, 0.4),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
);
radio.position.set(3.4, 1.5, -1);
scene.add(radio);

/* -----------------------------
   LOOP
----------------------------- */

function animate() {
    requestAnimationFrame(animate);
    updateMovement();
    renderer.render(scene, camera);
}

animate();

/* -----------------------------
   RESIZE
----------------------------- */

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
